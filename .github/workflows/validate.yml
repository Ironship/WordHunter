name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "release/**"

permissions:
  contents: read

jobs:
  validate:
    name: Repository validation (tests, clippy, licenses)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      WORDHUNTER_VALIDATE_CLIPPY: "1"
      WORDHUNTER_VALIDATE_LICENSES: "1"
      WORDHUNTER_DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libwayland-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            python3 \
            python3-aiohttp \
            python3-tomlkit

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend validation dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4
        with:
          components: rustfmt, clippy

      - name: Install pinned cargo-about
        run: cargo install cargo-about --version 0.9.1 --locked --features cli

      - name: Validate repository (build frontend before tests)
        run: ./scripts/validate.sh

  android-debug:
    name: Compile Android debug APK
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Android SDK and NDK packages
        shell: pwsh
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
          "NDK_HOME=$env:ANDROID_HOME\ndk\27.0.12077973" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4
        with:
          targets: aarch64-linux-android

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Build frontend and Android debug APK through the release recipe
        shell: cmd
        run: scripts\build.bat apk

      - name: Inspect Android debug APK
        run: node scripts/inspect-artifact.mjs android outputs/Word.Hunter.Pocket.debug.apk --abi arm64-v8a
