name: Release artifact validation

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing draft release tag to receive validated artifacts
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: artifact-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Release draft preflight
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Match a requested draft release to this revision
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          release_json="$(gh release view "$RELEASE_TAG" --json isDraft,targetCommitish)"
          test "$(jq -r .isDraft <<<"$release_json")" = "true"
          if ! target_sha="$(gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha 2>/dev/null)"; then
            release_target="$(jq -r .targetCommitish <<<"$release_json")"
            target_sha="$(gh api "repos/$GH_REPO/commits/$release_target" --jq .sha)"
          fi
          test "$target_sha" = "$GITHUB_SHA"

  frontend-validation:
    name: Frontend static validation
    needs: release-preflight
    if: ${{ !cancelled() && (needs.release-preflight.result == 'success' || needs.release-preflight.result == 'skipped') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend validation dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build and validate frontend sources
        run: npm run check:frontend

      - name: Validate frontend behavior and repository data
        run: |
          node scripts/validate-json-i18n.mjs
          node --experimental-vm-modules --test frontend-tests/shared/*.test.js frontend-tests/desktop/*.test.js frontend-tests/android/*.test.js

  android:
    name: Android APK and AAB
    needs: frontend-validation
    if: ${{ !cancelled() && needs.frontend-validation.result == 'success' }}
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Android SDK and NDK packages
        shell: pwsh
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
          "NDK_HOME=$env:ANDROID_HOME\ndk\27.0.12077973" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4
        with:
          targets: aarch64-linux-android

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Restore stable Android signing key
        shell: pwsh
        env:
          KEYSTORE_BASE64: ${{ secrets.WH_ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.WH_ANDROID_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.WH_ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.WH_ANDROID_KEY_PASSWORD }}
        run: |
          foreach ($value in @($env:KEYSTORE_BASE64, $env:KEY_ALIAS, $env:KEYSTORE_PASSWORD, $env:KEY_PASSWORD)) {
            if ([string]::IsNullOrWhiteSpace($value)) { throw "Android signing secrets are incomplete" }
          }
          $keystore = Join-Path $env:RUNNER_TEMP "wordhunter-pocket-release.p12"
          [IO.File]::WriteAllBytes($keystore, [Convert]::FromBase64String($env:KEYSTORE_BASE64))
          "WH_ANDROID_KEYSTORE=$keystore" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WH_ANDROID_KEY_ALIAS=$env:KEY_ALIAS" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WH_ANDROID_KEYSTORE_PASSWORD=$env:KEYSTORE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WH_ANDROID_KEY_PASSWORD=$env:KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WH_ANDROID_REQUIRE_SIGNING=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WH_ANDROID_EXPECTED_CERT_SHA256=b3b8336e4168d231b34a2483b4d444b92ee0324d04ec7dc6a8d92e628af6c85b" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build frontend, APK, and AAB through the release recipe
        shell: cmd
        run: scripts\build.bat apk aab

      - name: Inspect APK and AAB
        run: |
          node scripts/inspect-artifact.mjs android outputs/Word.Hunter.Pocket.debug.apk --abi arm64-v8a
          node scripts/inspect-artifact.mjs android outputs/Word.Hunter.Pocket.release.aab --abi arm64-v8a

      - name: Upload validated Android artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validated-android
          path: |
            outputs/Word.Hunter.Pocket.debug.apk
            outputs/Word.Hunter.Pocket.release.aab
          if-no-files-found: error

  windows:
    name: Windows portable ZIP and NSIS installer
    needs: frontend-validation
    if: ${{ !cancelled() && needs.frontend-validation.result == 'success' }}
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4
        with:
          targets: x86_64-pc-windows-msvc

      - name: Require preinstalled 7-Zip
        shell: pwsh
        run: |
          $sevenZip = "C:\Program Files\7-Zip"
          if (-not (Test-Path -LiteralPath (Join-Path $sevenZip "7z.exe"))) { throw "7-Zip is required" }
          $sevenZip | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Build frontend and Windows release packages
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts\build.bat all

      - name: Inspect Windows release packages
        run: |
          node scripts/inspect-artifact.mjs windows-portable outputs/Word.Hunter.portable.zip
          node scripts/inspect-artifact.mjs windows-nsis outputs/Word.Hunter.Setup.exe

      - name: Upload validated Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validated-windows
          path: |
            outputs/Word.Hunter.portable.zip
            outputs/Word.Hunter.Setup.exe
          if-no-files-found: error

  macos:
    name: macOS Apple Silicon DMG
    needs: frontend-validation
    if: ${{ !cancelled() && needs.frontend-validation.result == 'success' }}
    runs-on: macos-15
    timeout-minutes: 180
    outputs:
      version: ${{ steps.package-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4
        with:
          targets: aarch64-apple-darwin

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Read package version
        id: package-version
        run: |
          version="$(node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version.replace('+', '.'))")"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and smoke-test the Apple Silicon DMG
        run: ./scripts/build-macos.sh

      - name: Upload validated macOS DMG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validated-macos
          path: outputs/WordHunter-${{ steps.package-version.outputs.version }}-aarch64.dmg
          if-no-files-found: error

  flatpak:
    name: Flatpak bundle and installed file list
    needs: frontend-validation
    if: ${{ !cancelled() && needs.frontend-validation.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Install Flatpak build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends elfutils flatpak flatpak-builder ostree
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build frontend, then build and inspect Flatpak bundle
        run: ./scripts/build-flatpak.sh

      - name: Reinspect Flatpak bundle at the CI boundary
        run: node scripts/inspect-artifact.mjs flatpak outputs/WordHunter.flatpak

      - name: Upload validated Flatpak bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validated-flatpak
          path: outputs/WordHunter.flatpak
          if-no-files-found: error

  linux-native:
    name: Linux AppImage and DEB
    needs: frontend-validation
    if: ${{ !cancelled() && needs.frontend-validation.result == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    outputs:
      version: ${{ steps.package-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            curl \
            file \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            unzip

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Read package version
        id: package-version
        run: |
          version="$(node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version.replace('+', '.'))")"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build frontend, AppImage, and DEB through the release recipe
        run: bash scripts/build-linux-native.sh

      - name: Inspect Linux native release packages
        run: |
          node scripts/inspect-artifact.mjs linux-appimage "outputs/WordHunter-${{ steps.package-version.outputs.version }}-x86_64.AppImage"
          node scripts/inspect-artifact.mjs linux-deb "outputs/word-hunter_${{ steps.package-version.outputs.version }}_amd64.deb"

      - name: Upload validated Linux native artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validated-linux-native
          path: |
            outputs/WordHunter-${{ steps.package-version.outputs.version }}-x86_64.AppImage
            outputs/word-hunter_${{ steps.package-version.outputs.version }}_amd64.deb
          if-no-files-found: error

  linux-native-runtime:
    name: Linux native clean-runtime validation
    needs: linux-native
    if: ${{ !cancelled() && needs.linux-native.result == 'success' }}
    runs-on: ubuntu-22.04
    container: ubuntu:22.04
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Install AppImage host baseline and runtime test tools
        run: |
          apt-get update
          # AppImage's curated excludelist deliberately leaves these font and
          # graphics-driver-facing libraries on every supported desktop host.
          # The ubuntu container is not a desktop image, so install that host
          # baseline without installing GTK, WebKitGTK, or GStreamer runtimes.
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            appstream \
            ca-certificates \
            dbus-x11 \
            desktop-file-utils \
            file \
            git \
            libegl1 \
            libfontconfig1 \
            libfribidi0 \
            libgbm1 \
            libgles2 \
            libharfbuzz0b \
            lintian \
            xauth \
            xvfb

      - name: Checkout validation sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Download validated Linux native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: validated-linux-native
          path: release-assets

      - name: Reinspect packages on the clean runner
        env:
          VERSION: ${{ needs.linux-native.outputs.version }}
        run: |
          node scripts/inspect-artifact.mjs linux-appimage "release-assets/WordHunter-${VERSION}-x86_64.AppImage"
          node scripts/inspect-artifact.mjs linux-deb "release-assets/word-hunter_${VERSION}_amd64.deb"

      - name: Validate and smoke-test the self-contained AppImage
        env:
          APPIMAGE_PATH: ${{ github.workspace }}/release-assets/WordHunter-${{ needs.linux-native.outputs.version }}-x86_64.AppImage
        run: |
          chmod +x "$APPIMAGE_PATH"
          extracted="$(mktemp -d)"
          cleanup() { rm -rf "$extracted"; }
          trap cleanup EXIT
          (
            cd "$extracted"
            "$APPIMAGE_PATH" --appimage-extract >/dev/null
          )
          root="$extracted/squashfs-root"
          desktop-file-validate "$root/usr/share/applications/Word Hunter.desktop"
          appstreamcli validate --no-net "$root/usr/share/metainfo/com.wordhunter.app.metainfo.xml"

          main="$root/usr/bin/word-hunter-rustified"
          ocr_runner="$(find "$root/usr/lib" -type f -path '*/ocr-runtime/bin/wordhunter-paddleocr' -print -quit)"
          syncthing="$root/usr/bin/syncthing"
          test -x "$main" && test -x "$ocr_runner" && test -x "$syncthing"
          for executable in "$main" "$ocr_runner" "$syncthing"; do
            ldd_output="$(ldd "$executable" 2>&1 || true)"
            if grep -F "not found" <<<"$ldd_output"; then
              echo "Unresolved dynamic dependency in $executable" >&2
              exit 1
            fi
          done
          "$ocr_runner" --help | grep -F "wordhunter-paddleocr"
          "$syncthing" --version | grep -i -F "syncthing"

          set +e
          APPIMAGE_EXTRACT_AND_RUN=1 timeout 20s dbus-run-session -- xvfb-run -a "$APPIMAGE_PATH"
          status=$?
          set -e
          if [[ "$status" -ne 124 ]]; then
            echo "AppImage exited with status $status instead of remaining alive until the smoke-test timeout." >&2
            exit 1
          fi

      - name: Validate, install, smoke-test, and remove the DEB
        env:
          DEB_PATH: ${{ github.workspace }}/release-assets/word-hunter_${{ needs.linux-native.outputs.version }}_amd64.deb
        run: |
          lintian --show-overrides --fail-on error "$DEB_PATH"
          extracted="$(mktemp -d)"
          dpkg-deb --extract "$DEB_PATH" "$extracted"
          desktop-file-validate "$extracted/usr/share/applications/Word Hunter.desktop"
          appstreamcli validate --no-net "$extracted/usr/share/metainfo/com.wordhunter.app.metainfo.xml"
          rm -rf "$extracted"

          package_name="$(dpkg-deb --field "$DEB_PATH" Package)"
          if [[ ! "$package_name" =~ ^[a-z0-9][a-z0-9+.-]+$ ]]; then
            echo "Invalid Debian package name: $package_name" >&2
            exit 1
          fi
          cleanup() { apt-get remove -y "$package_name" >/dev/null || true; }
          trap cleanup EXIT
          DEBIAN_FRONTEND=noninteractive apt-get install -y "$DEB_PATH"

          main=/usr/bin/word-hunter-rustified
          package_files="$(dpkg-query -L "$package_name")"
          ocr_runner="$(awk '/\/ocr-runtime\/bin\/wordhunter-paddleocr$/ { print; exit }' <<<"$package_files")"
          syncthing="$(command -v syncthing)"
          ! grep -Fqx "/usr/bin/syncthing" <<<"$package_files"
          dpkg-query -S "$syncthing" | grep -E '^syncthing:'
          test -x "$main" && test -x "$ocr_runner" && test -x "$syncthing"
          for executable in "$main" "$ocr_runner" "$syncthing"; do
            ldd_output="$(ldd "$executable" 2>&1 || true)"
            if grep -F "not found" <<<"$ldd_output"; then
              echo "Unresolved dynamic dependency in $executable" >&2
              exit 1
            fi
          done
          "$ocr_runner" --help | grep -F "wordhunter-paddleocr"
          "$syncthing" --version | grep -i -F "syncthing"

          set +e
          timeout 20s dbus-run-session -- xvfb-run -a "$main"
          status=$?
          set -e
          if [[ "$status" -ne 124 ]]; then
            echo "Installed DEB application exited with status $status instead of remaining alive until the smoke-test timeout." >&2
            exit 1
          fi

          trap - EXIT
          apt-get remove -y "$package_name"

  publish-release:
    name: Attach validated artifacts to draft release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
    needs: [android, windows, macos, flatpak, linux-native, linux-native-runtime]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download validated artifacts on the GitHub runner
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: validated-*
          path: release-assets
          merge-multiple: true

      - name: Require the complete release asset set
        env:
          LINUX_VERSION: ${{ needs.linux-native.outputs.version }}
          MACOS_VERSION: ${{ needs.macos.outputs.version }}
        run: |
          for asset in \
            Word.Hunter.Pocket.debug.apk \
            Word.Hunter.Pocket.release.aab \
            Word.Hunter.portable.zip \
            Word.Hunter.Setup.exe \
            WordHunter-${MACOS_VERSION}-aarch64.dmg \
            WordHunter.flatpak \
            WordHunter-${LINUX_VERSION}-x86_64.AppImage \
            word-hunter_${LINUX_VERSION}_amd64.deb; do
            test -f "release-assets/$asset"
          done

      - name: Revalidate the draft release revision
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          release_json="$(gh release view "$RELEASE_TAG" --json isDraft,targetCommitish)"
          test "$(jq -r .isDraft <<<"$release_json")" = "true"
          if ! target_sha="$(gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha 2>/dev/null)"; then
            release_target="$(jq -r .targetCommitish <<<"$release_json")"
            target_sha="$(gh api "repos/$GH_REPO/commits/$release_target" --jq .sha)"
          fi
          test "$target_sha" = "$GITHUB_SHA"

      - name: Attach validated assets to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          LINUX_VERSION: ${{ needs.linux-native.outputs.version }}
          MACOS_VERSION: ${{ needs.macos.outputs.version }}
        run: |
          gh release upload "$RELEASE_TAG" \
            release-assets/Word.Hunter.Pocket.debug.apk \
            release-assets/Word.Hunter.Pocket.release.aab \
            release-assets/Word.Hunter.portable.zip \
            release-assets/Word.Hunter.Setup.exe \
            "release-assets/WordHunter-${MACOS_VERSION}-aarch64.dmg" \
            release-assets/WordHunter.flatpak \
            "release-assets/WordHunter-${LINUX_VERSION}-x86_64.AppImage" \
            "release-assets/word-hunter_${LINUX_VERSION}_amd64.deb" \
            --clobber
