app-id: com.wordhunter.app
branch: stable
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: word-hunter-rustified

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  - --filesystem=xdg-config/gtk-3.0:ro
  - --filesystem=xdg-config/kdeglobals:ro
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=host-os:ro
  - --talk-name=org.com_wordhunter_app.SingleInstance
  - --own-name=org.com_wordhunter_app.SingleInstance

modules:
  - name: word-hunter
    only-arches:
      - x86_64
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/word-hunter/cargo
        CARGO_NET_OFFLINE: "true"
        CTRANSLATE2_RELEASE: "4.6.0"
        ORT_LIB_LOCATION: /run/build/word-hunter/src-tauri/target/flatpak-onnxruntime
    build-commands:
      - cargo --offline --locked build --release --manifest-path src-tauri/Cargo.toml
      - cargo --offline --locked build --release --manifest-path src-tauri/ocr-runner/Cargo.toml
      - install -Dm755 src-tauri/target/release/word-hunter-rustified /app/bin/word-hunter-rustified
      - install -Dm755 src-tauri/ocr-runner/target/release/wordhunter-paddleocr /app/bin/ocr-runtime/bin/wordhunter-paddleocr
      - install -Dm755 src-tauri/target/flatpak-onnxruntime/lib/libwebgpu_dawn.so /app/lib/libwebgpu_dawn.so
      - install -Dm755 src-tauri/target/flatpak-pdfium/libpdfium.so /app/bin/ocr-runtime/bin/libpdfium.so
      - install -Dm644 src-tauri/target/flatpak-ocr-models/*.onnx -t /app/bin/ocr-runtime/models/
      - install -Dm755 src-tauri/target/flatpak-syncthing/syncthing /app/bin/syncthing
      - install -Dm644 src-tauri/target/flatpak-syncthing/LICENSE.txt /app/share/doc/word-hunter/SYNCTHING-LICENSE.txt
      - install -Dm644 src-tauri/target/flatpak-syncthing/AUTHORS.txt /app/share/doc/word-hunter/SYNCTHING-AUTHORS.txt
      - install -Dm644 LICENSE /app/share/licenses/com.wordhunter.app/LICENSE
      - install -Dm644 THIRD-PARTY-NOTICES.md THIRD-PARTY-LICENSES.html OCR-THIRD-PARTY-LICENSES.html -t /app/share/doc/word-hunter/
      - install -Dm644 flatpak/com.wordhunter.app.desktop /app/share/applications/com.wordhunter.app.desktop
      - install -Dm644 flatpak/com.wordhunter.app.metainfo.xml /app/share/metainfo/com.wordhunter.app.metainfo.xml
      - install -Dm644 src/assets/icon-16.png /app/share/icons/hicolor/16x16/apps/com.wordhunter.app.png
      - install -Dm644 src/assets/icon-32.png /app/share/icons/hicolor/32x32/apps/com.wordhunter.app.png
      - install -Dm644 src/assets/icon-48.png /app/share/icons/hicolor/48x48/apps/com.wordhunter.app.png
      - install -Dm644 src/assets/icon-64.png /app/share/icons/hicolor/64x64/apps/com.wordhunter.app.png
      - install -Dm644 src/assets/icon-128.png /app/share/icons/hicolor/128x128/apps/com.wordhunter.app.png
      - install -Dm644 src/assets/icon-256.png /app/share/icons/hicolor/256x256/apps/com.wordhunter.app.png
    sources:
      - type: dir
        path: .
        skip:
          - .flatpak-builder
          - .git
          - .worktree
          - .agents
          - .codex
          - .codex-remote-attachments
          - build
          - build_work
          - docs/android
          - docs/ddia-assessment.md
          - My_Data
          - node_modules
          - output
          - outputs
          - scratch
          - src-tauri/target
          - src-tauri/ocr-runner/target
          - TODO

      - flatpak/cargo-sources.json
      - type: archive
        archive-type: tar-gzip
        url: https://cdn.pyke.io/0/pyke:ort-rs/ms@1.22.0/x86_64-unknown-linux-gnu+wgpu.tgz
        sha256: d766b62a8419124d242bb02a0ab1d2407b86c39011fec6214d83d5ac304d5593
        dest: src-tauri/target/flatpak-onnxruntime
      - type: archive
        archive-type: tar-gzip
        url: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7920/pdfium-linux-x64.tgz
        sha256: 49ab3afbd4e6c1e284b5f2898129c8bb8a10fd785c1c5392c8c1fc70242f9ced
