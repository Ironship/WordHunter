<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Neue Wege, klare Worte: Deutsch B1</title>
  <desc id="desc">Cover einer deutschen B1-Lektüre mit leuchtend grüner Brücke, verbundenen Textpunkten und markanter B1-Typografie.</desc>
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16193d"/>
      <stop offset="1" stop-color="#303276"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="900" fill="url(#night)"/>
  <circle cx="520" cy="78" r="155" fill="#7354a6" opacity=".23"/>
