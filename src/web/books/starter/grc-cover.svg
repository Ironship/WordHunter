<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Χίλιαι Λέξεις: Μικραὶ Ἱστορίαι</title>
  <desc id="desc">A high-contrast cover showing a lamp illuminating a winding path from a small house toward an open book.</desc>
