<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Українська крок за кроком. Курс A1</title>
  <desc id="desc">Синьо-золота обкладинка курсу української мови A1 зі сходинками, діалоговими хмарками та стилізованою квіткою як образами перших мовних кроків.</desc>
