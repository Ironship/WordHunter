<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">月舟文庫の向こう岸　日本語レベル別読み物 B2</title>
  <desc id="desc">濃紺の層を光のプリズムが分け、複数の論点を照らす日本語B2読み物の表紙。</desc>
  <defs>
    <linearGradient id="b2-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11162b"/>
      <stop offset="1" stop-color="#34265d"/>
    </linearGradient>
    <linearGradient id="b2-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ce4dc" stop-opacity=".08"/>
      <stop offset="1" stop-color="#8ce4dc" stop-opacity=".9"/>
    </linearGradient>
    <filter id="b2-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="900" fill="url(#b2-bg)"/>
  <rect x="28" y="28" width="544" height="844" rx="24" fill="none" stroke="#f1e7cf" stroke-width="3"/>
