<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Аргументовано українською. Курс B2</title>
  <desc id="desc">Темно-синя обкладинка курсу української мови B2 з призмою, шарами аргументу та сфокусованим променем як образами нюансу й точності.</desc>
