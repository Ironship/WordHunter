    <path d="M13 257C89 271 129 318 208 305C286 292 300 210 368 213C415 215 442 245 480 268" fill="none" stroke="#ef9b45" stroke-width="13" stroke-linecap="round"/>
    <path d="M153 135C178 89 233 62 294 78C351 94 386 127 469 36" fill="none" stroke="#7dd7c0" stroke-width="10" stroke-linecap="round"/>
    <g fill="#103b46" stroke="#edf5e8" stroke-width="6">
