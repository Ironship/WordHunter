      <circle cx="153" cy="135" r="19"/>
      <circle cx="282" cy="237" r="19"/>
      <circle cx="469" cy="36" r="19"/>
    </g>
    <g fill="#ef9b45">
      <rect x="52" y="95" width="45" height="58" rx="4"/>
      <rect x="319" y="117" width="53" height="72" rx="4"/>
      <rect x="401" y="269" width="48" height="61" rx="4"/>
    </g>
    <g fill="#103b46">
