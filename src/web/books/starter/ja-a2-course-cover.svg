    <text x="0" y="53" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="26" font-weight="800" letter-spacing="5">WORD HUNTER</text>
    <circle cx="468" cy="42" r="17" fill="none" stroke="#ef9b45" stroke-width="5"/>
    <path d="M480 54l16 16" stroke="#ef9b45" stroke-width="5" stroke-linecap="round"/>
