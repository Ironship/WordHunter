  <text x="53" y="257" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="150" font-weight="900" letter-spacing="-8">B1</text>
  <path d="M56 283H294" stroke="#e8b85e" stroke-width="11"/>
