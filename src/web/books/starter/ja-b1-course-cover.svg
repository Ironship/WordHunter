<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">月舟文庫、町を歩く　日本語レベル別読み物 B1</title>
  <desc id="desc">藍色の紙面から言葉の橋が伸び、経験と地域を結ぶ日本語B1読み物の表紙。</desc>
  <defs>
    <linearGradient id="b1-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18233f"/>
      <stop offset="1" stop-color="#334b7b"/>
    </linearGradient>
    <linearGradient id="b1-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2dc"/>
      <stop offset="1" stop-color="#e8d8bf"/>
    </linearGradient>
    <filter id="b1-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0b1122" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect width="600" height="900" fill="url(#b1-bg)"/>
  <rect x="28" y="28" width="544" height="844" rx="24" fill="none" stroke="#fff2dc" stroke-width="3"/>
  <rect x="54" y="60" width="222" height="42" rx="21" fill="#dc6b55"/>
