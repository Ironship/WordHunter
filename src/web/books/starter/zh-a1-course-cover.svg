  <text x="55" y="83" fill="#ffe9b9" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="5">汉语课程</text>
  <text x="49" y="276" fill="#ffffff" font-family="Arial, sans-serif" font-size="160" font-weight="900" letter-spacing="-7">A1</text>
  <path d="M55 310h229" stroke="#f26b4f" stroke-width="11"/>
  <text x="57" y="360" fill="#ffe9b9" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">你好，新生活</text>
  <g transform="translate(55 802)">
